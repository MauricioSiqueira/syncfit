spring:
  application:
    name: syncfit-api

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/academia
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false # TODO: Verificar o motivo de nao funcionar com true
#    locations: classpath:db/migration
#    baseline-on-migrate: true